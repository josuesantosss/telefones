<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · EMEF Cel. Aureliano Junqueira Franco</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px 35px;
            max-width: 480px;
            width: 100%;
            transition: all 0.3s ease;
            text-align: center;
        }

        .header {
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 3px solid #4299e1;
        }

        .header .logo {
            font-size: 42px;
            margin-bottom: 8px;
            display: block;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a365d;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .header h1 span {
            display: block;
            font-size: 16px;
            font-weight: 400;
            color: #4a5568;
            margin-top: 4px;
            letter-spacing: 0;
        }

        .header .sub {
            font-size: 15px;
            color: #718096;
            margin-top: 6px;
            font-weight: 500;
        }

        .form-login {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 8px;
            text-align: left;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
            color: #2d3748;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label .icone-label {
            font-size: 18px;
        }

        .form-group input {
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f7fafc;
            outline: none;
            width: 100%;
        }

        .form-group input:focus {
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.25);
            background: white;
        }

        .form-group input::placeholder {
            color: #a0aec0;
        }

        .btn-entrar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 24px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            color: white;
            background: #4299e1;
            box-shadow: 0 4px 12px rgba(66, 153, 225, 0.30);
            width: 100%;
            margin-top: 8px;
        }

        .btn-entrar:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(66, 153, 225, 0.45);
            background: #3182ce;
        }

        .btn-entrar:active {
            transform: translateY(0);
        }

        .btn-entrar .icone {
            font-size: 24px;
            line-height: 1;
        }

        .mensagem-erro {
            background: #fed7d7;
            color: #9b2c2c;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #e53e3e;
            margin-top: 6px;
        }

        .mensagem-erro.visivel {
            display: flex;
        }

        .mensagem-erro .icone-erro {
            font-size: 20px;
        }

        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
            font-size: 14px;
            color: #a0aec0;
            letter-spacing: 0.3px;
        }

        .footer strong {
            color: #4a5568;
            font-weight: 600;
        }

        .footer .ano {
            color: #718096;
        }

        .link-voltar {
            margin-top: 14px;
            display: inline-block;
            color: #4299e1;
            font-weight: 500;
            text-decoration: none;
            font-size: 14px;
        }

        .link-voltar:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            .header h1 {
                font-size: 21px;
            }
            .header h1 span {
                font-size: 14px;
            }
            .btn-entrar {
                font-size: 16px;
                padding: 15px 18px;
            }
            .btn-entrar .icone {
                font-size: 20px;
            }
            .form-group input {
                padding: 12px 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <span class="logo">🏫</span>
            <h1>
                EMEF Cel. Aureliano Junqueira Franco
                <span>Secretaria Escolar</span>
            </h1>
            <div class="sub">Acesso restrito · informe suas credenciais</div>
        </div>

        <form class="form-login" id="formLogin" autocomplete="off">

            <div class="form-group">
                <label>
                    <span class="icone-label">👤</span> Usuário
                </label>
                <input
                    type="text"
                    id="usuario"
                    placeholder="Digite seu usuário"
                    required
                />
            </div>

            <div class="form-group">
                <label>
                    <span class="icone-label">🔐</span> Senha
                </label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    required
                />
            </div>

            <div class="mensagem-erro" id="mensagemErro">
                <span class="icone-erro">⚠️</span>
                <span id="textoErro">Usuário ou senha inválidos.</span>
            </div>

            <button type="submit" class="btn-entrar">
                <span class="icone">➡️</span>
                Entrar
            </button>

        </form>

        <div class="footer">
            Desenvolvido por <strong>Josué Santos</strong> <span class="ano">2026</span>
            <br />
            <a href="index.html" class="link-voltar">← Voltar para o início</a>
        </div>

    </div>

    <script>
        (function() {
            // ============================================================
            // 1. DADOS DA PLANILHA (aba LOGIN)
            // ============================================================
            const CREDENCIAIS = [
                { usuario: "admin", senha: "123456" },
                { usuario: "secretaria", senha: "escola2026" },
                { usuario: "professor", senha: "prof123" },
                { usuario: "coordenacao", senha: "coord@2026" },
                { usuario: "direcao", senha: "diretor#1" }
            ];

            // ============================================================
            // 2. ELEMENTOS DOM
            // ============================================================
            const form = document.getElementById('formLogin');
            const inputUsuario = document.getElementById('usuario');
            const inputSenha = document.getElementById('senha');
            const mensagemErro = document.getElementById('mensagemErro');
            const textoErro = document.getElementById('textoErro');

            // ============================================================
            // 3. FUNÇÃO DE VALIDAÇÃO
            // ============================================================
            function validarCredenciais(usuario, senha) {
                const usuarioTrim = usuario.trim();
                const senhaTrim = senha.trim();

                const encontrado = CREDENCIAIS.some(cred =>
                    cred.usuario.toLowerCase() === usuarioTrim.toLowerCase() &&
                    cred.senha === senhaTrim
                );

                return encontrado;
            }

            // ============================================================
            // 4. GERENCIAMENTO DE SESSÃO
            // ============================================================
            const SESSION_TIMEOUT = 10 * 60 * 1000; // 10 minutos em milissegundos
            let timeoutId = null;

            function iniciarSessao(usuario) {
                // Salva o usuário e timestamp da última atividade
                sessionStorage.setItem('usuarioLogado', usuario);
                sessionStorage.setItem('ultimaAtividade', Date.now().toString());
                
                // Inicia o timer de logout
                resetarTimer();
            }

            function resetarTimer() {
                // Limpa o timer existente
                if (timeoutId) {
                    clearTimeout(timeoutId);
                }
                
                // Verifica se há uma sessão ativa
                const usuario = sessionStorage.getItem('usuarioLogado');
                if (!usuario) return;

                // Agenda o logout após o tempo definido
                timeoutId = setTimeout(() => {
                    realizarLogout();
                }, SESSION_TIMEOUT);
            }

            function realizarLogout() {
                // Limpa os dados da sessão
                sessionStorage.removeItem('usuarioLogado');
                sessionStorage.removeItem('ultimaAtividade');
                
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }

                // Redireciona para a página de login com parâmetro de timeout
                window.location.href = 'login.html?timeout=1';
            }

            function verificarSessao() {
                const usuario = sessionStorage.getItem('usuarioLogado');
                const ultimaAtividade = sessionStorage.getItem('ultimaAtividade');

                // Se não houver sessão, redireciona para login
                if (!usuario || !ultimaAtividade) {
                    // Se não estiver na página de login, redireciona
                    if (!window.location.pathname.includes('login.html')) {
                        window.location.href = 'login.html';
                    }
                    return;
                }

                // Verifica se o tempo limite foi excedido
                const tempoDecorrido = Date.now() - parseInt(ultimaAtividade);
                if (tempoDecorrido >= SESSION_TIMEOUT) {
                    realizarLogout();
                    return;
                }

                // Se estiver na página de login mas já logado, redireciona para o index
                if (window.location.pathname.includes('login.html')) {
                    window.location.href = 'index.html';
                    return;
                }

                // Atualiza o timestamp da última atividade
                atualizarAtividade();
                
                // Inicia o timer
                resetarTimer();
            }

            function atualizarAtividade() {
                if (sessionStorage.getItem('usuarioLogado')) {
                    sessionStorage.setItem('ultimaAtividade', Date.now().toString());
                }
            }

            // ============================================================
            // 5. EVENTOS DE ATIVIDADE DO USUÁRIO
            // ============================================================
            function configurarDetectoresDeAtividade() {
                const eventos = [
                    'click', 'mousemove', 'keydown', 
                    'scroll', 'touchstart', 'focus'
                ];

                eventos.forEach(evento => {
                    document.addEventListener(evento, () => {
                        // Atualiza a atividade e reinicia o timer
                        atualizarAtividade();
                        resetarTimer();
                    });
                });
            }

            // ============================================================
            // 6. SUBMISSÃO DO FORM
            // ============================================================
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const usuario = inputUsuario.value;
                const senha = inputSenha.value;

                mensagemErro.classList.remove('visivel');

                if (!usuario.trim() || !senha.trim()) {
                    textoErro.textContent = 'Por favor, preencha usuário e senha.';
                    mensagemErro.classList.add('visivel');
                    return;
                }

                const autenticado = validarCredenciais(usuario, senha);

                if (autenticado) {
                    // Inicia a sessão
                    iniciarSessao(usuario);
                    
                    // Redireciona para a página inicial
                    window.location.href = 'index.html';
                } else {
                    textoErro.textContent = 'Usuário ou senha incorretos. Tente novamente.';
                    mensagemErro.classList.add('visivel');
                    inputSenha.value = '';
                    inputSenha.focus();
                }
            });

            // ============================================================
            // 7. INICIALIZAÇÃO
            // ============================================================
            // Verifica se há uma sessão ativa ao carregar a página
            verificarSessao();

            // Configura os detectores de atividade
            configurarDetectoresDeAtividade();

            // Ao digitar, esconde mensagem de erro
            inputUsuario.addEventListener('input', () => {
                mensagemErro.classList.remove('visivel');
            });
            inputSenha.addEventListener('input', () => {
                mensagemErro.classList.remove('visivel');
            });

            // Verifica se veio com parâmetro de timeout
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('timeout') === '1') {
                textoErro.textContent = 'Sua sessão expirou por inatividade. Faça login novamente.';
                mensagemErro.classList.add('visivel');
            }

        })();
    </script>

</body>
</html>
