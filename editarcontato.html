<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Dados da Planilha</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.10);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }
        h2 {
            color: #2d3748;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h2::before {
            content: "✏️";
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select, input {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: #f7fafc;
            transition: all 0.3s ease;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66,153,225,0.2);
            background: white;
        }
        select:disabled, input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .row { grid-template-columns: 1fr; }
        }

        #area-edicao {
            margin-top: 25px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 12px;
            border: 2px dashed #e2e8f0;
            min-height: 100px;
            transition: all 0.3s ease;
        }
        #area-edicao.has-data {
            border-style: solid;
            border-color: #4299e1;
            background: #ebf8ff;
        }

        .campo-edicao {
            margin-bottom: 15px;
        }
        .campo-edicao label {
            font-size: 13px;
            text-transform: none;
            font-weight: 600;
            color: #2d3748;
        }
        .campo-edicao input {
            background: white;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 15px;
        }
        .campo-edicao input:focus {
            border-color: #4299e1;
        }

        .botoes {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #4299e1;
            color: white;
        }
        .btn-primary:hover {
            background: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(66,153,225,0.3);
        }
        .btn-success {
            background: #48bb78;
            color: white;
        }
        .btn-success:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72,187,120,0.3);
        }
        .btn-danger {
            background: #fc8181;
            color: white;
        }
        .btn-danger:hover {
            background: #f56565;
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .placeholder {
            color: #a0aec0;
            text-align: center;
            padding: 30px 0;
            font-size: 15px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-top-color: #4299e1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            color: #e53e3e;
            background: #fff5f5;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #e53e3e;
        }
        .success {
            color: #276749;
            background: #f0fff4;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #48bb78;
        }
        .aluno-nome {
            font-size: 20px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4299e1;
        }
        .info-extra {
            font-size: 14px;
            color: #718096;
            margin-top: 10px;
            font-style: italic;
        }
        .status-msg {
            margin-top: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            display: none;
        }
        .status-msg.show {
            display: block;
        }
        .status-msg.success {
            background: #f0fff4;
            border: 1px solid #48bb78;
            color: #276749;
        }
        .status-msg.error {
            background: #fff5f5;
            border: 1px solid #fc8181;
            color: #c53030;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Editar Alunos</h2>

    <!-- ====== SELETORES ====== -->
    <div class="row">
        <div class="form-group">
            <label for="selectTurma">Turma</label>
            <select id="selectTurma">
                <option value="">Carregando turmas...</option>
            </select>
        </div>
        <div class="form-group">
            <label for="selectAluno">Aluno</label>
            <select id="selectAluno" disabled>
                <option value="">Selecione uma turma primeiro</option>
            </select>
        </div>
    </div>

    <!-- ====== ÁREA DE EDIÇÃO ====== -->
    <div id="area-edicao">
        <div class="placeholder">👤 Selecione um aluno para editar os dados</div>
    </div>

    <!-- ====== STATUS ====== -->
    <div id="statusMsg" class="status-msg"></div>
</div>

<script>
    // ================================================================
    // 1. CONFIGURAÇÃO
    // ================================================================
    // ⚠️ SUBSTITUA PELA URL DO SEU WEB APP (obtida ao publicar)
    const API_URL = 'https://script.google.com/macros/s/AKfycbzYO05rFQqfiRjQRWl4Rpz7BvXMqhA0Fvhvj46iPszHkTDbxCKAZA52ogRKmfj1sQSGmw/exec';

    // ================================================================
    // 2. ESTADO
    // ================================================================
    let dadosCompletos = {};      // { sheetName: [ [linha0], [linha1], ... ] }
    let cabecalhos = {};          // { sheetName: [col0, col1, ...] }
    let alunoSelecionado = null;  // { nome, linhaIndex, dados: {} }

    // ================================================================
    // 3. FUNÇÕES DE COMUNICAÇÃO COM O WEB APP
    // ================================================================
async function chamarApi(action, params = {}) {
    // ===== Ações de LEITURA (GET) – sem CORS =====
    if (action === 'getSheets' || action === 'getFullSheet') {
        const url = new URL(API_URL);
        url.searchParams.append('action', action);
        for (const [key, value] of Object.entries(params)) {
            url.searchParams.append(key, JSON.stringify(value));
        }

        const response = await fetch(url, {
            method: 'GET',
            mode: 'cors'
        });
        if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        return data;
    }

    // ===== Ações de ESCRITA (POST) – com text/plain para evitar CORS =====
    const response = await fetch(API_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action, ...params })
    });
    if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
    const data = await response.json();
    if (data.error) throw new Error(data.error);
    return data;
}

    // ================================================================
    // 4. CARREGAR LISTA DE TURMAS
    // ================================================================
    async function carregarTurmas() {
        const select = document.getElementById('selectTurma');
        const area = document.getElementById('area-edicao');
        try {
            select.innerHTML = '<option value="">⏳ Carregando...</option>';
            const result = await chamarApi('getSheets');
            const sheets = result.sheets || [];

            // Filtra apenas as turmas (ex: 1A, 1B, ...) - ignora "TELEFONS" se existir
            const turmas = sheets
                .filter(n => /^[1-5][A-E]$/.test(n) || /^4[A-D]$/.test(n))
                .sort();

            select.innerHTML = '<option value="">📚 Selecione a turma</option>';
            turmas.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                select.appendChild(opt);
            });

            document.getElementById('selectAluno').disabled = true;
            area.innerHTML = '<div class="placeholder">👤 Selecione uma turma primeiro</div>';
            area.classList.remove('has-data');

        } catch (err) {
            console.error(err);
            select.innerHTML = '<option value="">❌ Erro ao carregar</option>';
            area.innerHTML = `<div class="error">❌ ${err.message}</div>`;
        }
    }

    // ================================================================
    // 5. CARREGAR DADOS DE UMA TURMA
    // ================================================================
    async function carregarDadosTurma(sheetName) {
        const selectAluno = document.getElementById('selectAluno');
        const area = document.getElementById('area-edicao');

        try {
            area.innerHTML = '<div class="placeholder"><span class="loading"></span> Carregando alunos...</div>';

            const result = await chamarApi('getFullSheet', { sheetName });
            const data = result || [];

            if (data.length < 2) {
                area.innerHTML = '<div class="placeholder">📭 Nenhum aluno cadastrado nesta turma</div>';
                selectAluno.innerHTML = '<option value="">Nenhum aluno</option>';
                selectAluno.disabled = true;
                return;
            }

            // Guarda os dados completos
            dadosCompletos[sheetName] = data;
            cabecalhos[sheetName] = data[0];

            // Popula o dropdown de alunos (ignora o cabeçalho)
            const nomes = data.slice(1).map(row => row[0]?.trim() || '').filter(n => n);
            selectAluno.innerHTML = '<option value="">👤 Selecione um aluno</option>';
            nomes.forEach(nome => {
                const opt = document.createElement('option');
                opt.value = nome;
                opt.textContent = nome;
                selectAluno.appendChild(opt);
            });
            selectAluno.disabled = false;

            // Limpa a área de edição
            area.innerHTML = '<div class="placeholder">👤 Selecione um aluno para editar</div>';
            area.classList.remove('has-data');

        } catch (err) {
            console.error(err);
            area.innerHTML = `<div class="error">❌ ${err.message}</div>`;
            selectAluno.innerHTML = '<option value="">Erro</option>';
            selectAluno.disabled = true;
        }
    }

    // ================================================================
    // 6. EXIBIR ALUNO PARA EDIÇÃO
    // ================================================================
    function exibirAluno(sheetName, nomeAluno) {
        const area = document.getElementById('area-edicao');
        const data = dadosCompletos[sheetName];
        if (!data) {
            area.innerHTML = '<div class="error">❌ Dados da turma não carregados</div>';
            return;
        }

        const headers = cabecalhos[sheetName];
        // Procura a linha do aluno (ignora cabeçalho)
        const linhaIndex = data.findIndex((row, idx) => idx > 0 && row[0]?.trim() === nomeAluno);
        if (linhaIndex === -1) {
            area.innerHTML = `<div class="error">❌ Aluno "${nomeAluno}" não encontrado</div>`;
            return;
        }

        const linha = data[linhaIndex];
        const alunoObj = {};
        headers.forEach((h, i) => {
            alunoObj[h] = linha[i] || '';
        });

        alunoSelecionado = {
            nome: nomeAluno,
            linhaIndex: linhaIndex,
            dados: alunoObj,
            headers: headers,
            linhaRaw: linha,
            sheetName: sheetName
        };

        // Monta o HTML de edição
        let html = `<div class="aluno-nome">👤 ${nomeAluno}</div>`;
        html += `<div style="margin-bottom:12px; font-size:14px; color:#718096;">Edite os campos abaixo e clique em <strong>Salvar</strong>.</div>`;

        // Para cada coluna (exceto a primeira, que é o nome)
        for (let i = 1; i < headers.length; i++) {
            const chave = headers[i];
            const valor = alunoObj[chave] || '';
            html += `
                <div class="campo-edicao">
                    <label>${chave}</label>
                    <input type="text" id="campo_${i}" value="${escapeHtml(valor)}" data-colindex="${i}" />
                </div>
            `;
        }

        html += `
            <div class="botoes">
                <button class="btn btn-success" id="btnSalvar" onclick="salvarAluno()">💾 Salvar alterações</button>
                <button class="btn btn-danger" id="btnCancelar" onclick="cancelarEdicao()">↩️ Cancelar</button>
            </div>
            <div class="info-extra">* As alterações são salvas diretamente na planilha.</div>
        `;

        area.innerHTML = html;
        area.classList.add('has-data');

        // Esconde mensagem de status anterior
        document.getElementById('statusMsg').className = 'status-msg';
        document.getElementById('statusMsg').textContent = '';
    }

    // ================================================================
    // 7. SALVAR ALTERAÇÕES
    // ================================================================
    async function salvarAluno() {
        if (!alunoSelecionado) {
            mostrarStatus('Nenhum aluno selecionado.', 'error');
            return;
        }

        const btn = document.getElementById('btnSalvar');
        btn.disabled = true;
        btn.textContent = '⏳ Salvando...';

        try {
            const sheetName = alunoSelecionado.sheetName;
            const linhaIndex = alunoSelecionado.linhaIndex;
            const headers = alunoSelecionado.headers;

            // Coleta os valores dos inputs
            const novaLinha = [...alunoSelecionado.linhaRaw];
            for (let i = 1; i < headers.length; i++) {
                const input = document.getElementById(`campo_${i}`);
                if (input) {
                    novaLinha[i] = input.value;
                }
            }

            // Atualiza a linha na planilha via API
            await chamarApi('updateRow', {
                sheetName: sheetName,
                rowIndex: linhaIndex,       // 0-based entre os dados (sem cabeçalho)
                rowData: novaLinha
            });

            // Atualiza o cache local
            dadosCompletos[sheetName][linhaIndex] = novaLinha;
            alunoSelecionado.linhaRaw = novaLinha;
            // Atualiza o objeto de dados
            headers.forEach((h, i) => {
                alunoSelecionado.dados[h] = novaLinha[i] || '';
            });

            mostrarStatus('✅ Alterações salvas com sucesso!', 'success');

        } catch (err) {
            console.error(err);
            mostrarStatus(`❌ Erro ao salvar: ${err.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '💾 Salvar alterações';
        }
    }

    // ================================================================
    // 8. CANCELAR EDIÇÃO
    // ================================================================
    function cancelarEdicao() {
        if (alunoSelecionado) {
            exibirAluno(alunoSelecionado.sheetName, alunoSelecionado.nome);
        }
        document.getElementById('statusMsg').className = 'status-msg';
        document.getElementById('statusMsg').textContent = '';
    }

    // ================================================================
    // 9. UTILITÁRIOS
    // ================================================================
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function mostrarStatus(msg, tipo) {
        const el = document.getElementById('statusMsg');
        el.textContent = msg;
        el.className = `status-msg show ${tipo}`;
    }

    // ================================================================
    // 10. EVENTOS
    // ================================================================
    document.getElementById('selectTurma').addEventListener('change', function() {
        const turma = this.value;
        const selectAluno = document.getElementById('selectAluno');
        const area = document.getElementById('area-edicao');

        if (!turma) {
            selectAluno.innerHTML = '<option value="">Selecione uma turma primeiro</option>';
            selectAluno.disabled = true;
            area.innerHTML = '<div class="placeholder">👤 Selecione uma turma primeiro</div>';
            area.classList.remove('has-data');
            return;
        }

        carregarDadosTurma(turma);
    });

    document.getElementById('selectAluno').addEventListener('change', function() {
        const nome = this.value;
        const turma = document.getElementById('selectTurma').value;
        if (!nome || !turma) return;
        exibirAluno(turma, nome);
    });

    // ================================================================
    // 11. INICIALIZAÇÃO
    // ================================================================
    carregarTurmas();

    // (Opcional) Recarregar com Cmd/Ctrl + R
    document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'r') {
            if (confirm('Recarregar os dados da planilha?')) {
                location.reload();
            }
            e.preventDefault();
        }
    });
</script>

</body>
</html>
