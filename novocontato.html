<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adicionar Telefones</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            max-width: 820px;
            width: 100%;
            border-radius: 20px;
            padding: 30px 30px 35px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 26px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .sub {
            color: #555;
            font-size: 14px;
            margin-bottom: 28px;
            border-left: 4px solid #4a7cff;
            padding-left: 14px;
        }
        .linha {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
        }
        .campo {
            flex: 1 1 180px;
            display: flex;
            flex-direction: column;
        }
        .campo label {
            font-weight: 600;
            font-size: 13px;
            color: #2d2d44;
            margin-bottom: 5px;
        }
        .campo select,
        .campo input {
            padding: 10px 12px;
            border: 1.5px solid #d0d5dd;
            border-radius: 10px;
            font-size: 14px;
            background: #fafbfc;
            transition: 0.2s;
        }
        .campo select:focus,
        .campo input:focus {
            outline: none;
            border-color: #4a7cff;
            box-shadow: 0 0 0 3px rgba(74, 124, 255, 0.15);
            background: #fff;
        }
        .bloco-telefones {
            margin: 20px 0 10px;
        }
        .bloco-telefones h3 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bloco-telefones h3 span {
            background: #eef2ff;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 13px;
            color: #4a7cff;
        }
        .cartao-tel {
            background: #f8faff;
            border: 1px solid #e4e9f2;
            border-radius: 14px;
            padding: 18px 16px 16px;
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 14px;
        }
        .cartao-tel .campo {
            flex: 1 1 100px;
            min-width: 70px;
        }
        .cartao-tel .campo.parentesco {
            flex: 1 1 140px;
        }
        .cartao-tel .campo.ddd {
            flex: 0 1 70px;
            min-width: 60px;
        }
        .cartao-tel .campo.tel {
            flex: 1 1 130px;
        }
        .cartao-tel .rotulo-tel {
            font-size: 12px;
            font-weight: 600;
            color: #4a7cff;
            background: #eef2ff;
            padding: 2px 14px;
            border-radius: 30px;
            align-self: center;
            margin-right: auto;
        }
        .acoes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 22px;
        }
        .btn {
            background: #1a1a2e;
            color: #fff;
            border: none;
            padding: 12px 36px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: #2d2d44;
            transform: scale(1.02);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .msg {
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            display: none;
        }
        .msg.erro {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .msg.sucesso {
            background: #dcfce7;
            color: #166534;
            display: block;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        footer {
            margin-top: 24px;
            font-size: 12px;
            color: #888;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 18px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 20px 16px;
            }
            .cartao-tel {
                flex-direction: column;
                align-items: stretch;
            }
            .cartao-tel .campo {
                flex: 1 1 auto;
            }
            .cartao-tel .rotulo-tel {
                margin-right: 0;
                align-self: flex-start;
            }
            .linha {
                flex-direction: column;
                gap: 14px;
            }
            .campo {
                flex: 1 1 auto;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📞 Adicionar Telefones</h1>
        <div class="sub">Preencha os dados do aluno e até 4 telefones.</div>

        <form id="formTelefones">
            <!-- Turma + Nome -->
            <div class="linha">
                <div class="campo">
                    <label for="turma">Turma (aba da planilha)</label>
                    <select id="turma" required>
                        <option value="">— Selecione —</option>
                        <optgroup label="1º Ano">
                            <option value="1º Ano A">1º Ano A</option>
                            <option value="1º Ano B">1º Ano B</option>
                            <option value="1º Ano C">1º Ano C</option>
                            <option value="1º Ano D">1º Ano D</option>
                            <option value="1º Ano E">1º Ano E</option>
                        </optgroup>
                        <optgroup label="2º Ano">
                            <option value="2º Ano A">2º Ano A</option>
                            <option value="2º Ano B">2º Ano B</option>
                            <option value="2º Ano C">2º Ano C</option>
                            <option value="2º Ano D">2º Ano D</option>
                            <option value="2º Ano E">2º Ano E</option>
                        </optgroup>
                        <optgroup label="3º Ano">
                            <option value="3º Ano A">3º Ano A</option>
                            <option value="3º Ano B">3º Ano B</option>
                            <option value="3º Ano C">3º Ano C</option>
                            <option value="3º Ano D">3º Ano D</option>
                            <option value="3º Ano E">3º Ano E</option>
                        </optgroup>
                        <optgroup label="4º Ano">
                            <option value="4º Ano A">4º Ano A</option>
                            <option value="4º Ano B">4º Ano B</option>
                            <option value="4º Ano C">4º Ano C</option>
                            <option value="4º Ano D">4º Ano D</option>
                        </optgroup>
                        <optgroup label="5º Ano">
                            <option value="5º Ano A">5º Ano A</option>
                            <option value="5º Ano B">5º Ano B</option>
                            <option value="5º Ano C">5º Ano C</option>
                            <option value="5º Ano D">5º Ano D</option>
                            <option value="5º Ano E">5º Ano E</option>
                        </optgroup>
                    </select>
                </div>
                <div class="campo" style="flex:2 1 260px;">
                    <label for="nome">Nome completo do aluno</label>
                    <input type="text" id="nome" placeholder="Ex: MARIA DA SILVA" required autocomplete="off" />
                </div>
            </div>

            <!-- 4 telefones -->
            <div class="bloco-telefones">
                <h3>Telefones <span>até 4</span></h3>

                <!-- Telefone 1 -->
                <div class="cartao-tel">
                    <span class="rotulo-tel">#1</span>
                    <div class="campo parentesco">
                        <label>Parentesco</label>
                        <select class="parentesco-select">
                            <option value="">—</option>
                            <option>Pai</option>
                            <option>Mãe</option>
                            <option>Padrasto</option>
                            <option>Madrasta</option>
                            <option>Avó(ô)</option>
                            <option>Bisavó(ô)</option>
                            <option>Irmã(o)</option>
                            <option>Responsável</option>
                            <option>Vizinha(a)</option>
                            <option>Trabalho</option>
                        </select>
                    </div>
                    <div class="campo ddd">
                        <label>DDD</label>
                        <input type="text" class="ddd-input" maxlength="2" inputmode="numeric" placeholder="11" />
                    </div>
                    <div class="campo tel">
                        <label>Telefone</label>
                        <input type="text" class="tel-input" maxlength="9" inputmode="numeric" placeholder="912345678" />
                    </div>
                </div>

                <!-- Telefone 2 -->
                <div class="cartao-tel">
                    <span class="rotulo-tel">#2</span>
                    <div class="campo parentesco">
                        <label>Parentesco</label>
                        <select class="parentesco-select">
                            <option value="">—</option>
                            <option>Pai</option>
                            <option>Mãe</option>
                            <option>Padrasto</option>
                            <option>Madrasta</option>
                            <option>Avó(ô)</option>
                            <option>Bisavó(ô)</option>
                            <option>Irmã(o)</option>
                            <option>Responsável</option>
                            <option>Vizinha(a)</option>
                            <option>Trabalho</option>
                        </select>
                    </div>
                    <div class="campo ddd">
                        <label>DDD</label>
                        <input type="text" class="ddd-input" maxlength="2" inputmode="numeric" placeholder="11" />
                    </div>
                    <div class="campo tel">
                        <label>Telefone</label>
                        <input type="text" class="tel-input" maxlength="9" inputmode="numeric" placeholder="912345678" />
                    </div>
                </div>

                <!-- Telefone 3 -->
                <div class="cartao-tel">
                    <span class="rotulo-tel">#3</span>
                    <div class="campo parentesco">
                        <label>Parentesco</label>
                        <select class="parentesco-select">
                            <option value="">—</option>
                            <option>Pai</option>
                            <option>Mãe</option>
                            <option>Padrasto</option>
                            <option>Madrasta</option>
                            <option>Avó(ô)</option>
                            <option>Bisavó(ô)</option>
                            <option>Irmã(o)</option>
                            <option>Responsável</option>
                            <option>Vizinha(a)</option>
                            <option>Trabalho</option>
                        </select>
                    </div>
                    <div class="campo ddd">
                        <label>DDD</label>
                        <input type="text" class="ddd-input" maxlength="2" inputmode="numeric" placeholder="11" />
                    </div>
                    <div class="campo tel">
                        <label>Telefone</label>
                        <input type="text" class="tel-input" maxlength="9" inputmode="numeric" placeholder="912345678" />
                    </div>
                </div>

                <!-- Telefone 4 -->
                <div class="cartao-tel">
                    <span class="rotulo-tel">#4</span>
                    <div class="campo parentesco">
                        <label>Parentesco</label>
                        <select class="parentesco-select">
                            <option value="">—</option>
                            <option>Pai</option>
                            <option>Mãe</option>
                            <option>Padrasto</option>
                            <option>Madrasta</option>
                            <option>Avó(ô)</option>
                            <option>Bisavó(ô)</option>
                            <option>Irmã(o)</option>
                            <option>Responsável</option>
                            <option>Vizinha(a)</option>
                            <option>Trabalho</option>
                        </select>
                    </div>
                    <div class="campo ddd">
                        <label>DDD</label>
                        <input type="text" class="ddd-input" maxlength="2" inputmode="numeric" placeholder="11" />
                    </div>
                    <div class="campo tel">
                        <label>Telefone</label>
                        <input type="text" class="tel-input" maxlength="9" inputmode="numeric" placeholder="912345678" />
                    </div>
                </div>
            </div>

            <!-- Ações -->
            <div class="acoes">
                <button type="submit" class="btn" id="btnEnviar">
                    ✅ Salvar Telefones
                </button>
                <button type="reset" class="btn" style="background:#6c757d;" id="btnLimpar">
                    🔄 Limpar
                </button>
            </div>

            <div id="mensagem" class="msg"></div>
        </form>

        <footer>
            Os dados são enviados para a planilha · Google Apps Script
        </footer>
    </div>

    <script>
        // ===== CONFIGURAÇÃO =====
        // Substitua pela URL do seu Web App do Google Apps Script
        const WEBAPP_URL = 'https://script.google.com/macros/s/SEU_ID_AQUI/exec';

        // ===== NORMALIZAÇÃO DO NOME =====
        function normalizarNome(raw) {
            let nome = raw.toUpperCase();
            const mapa = {
                'Á': 'A',
                'À': 'A',
                'Ã': 'A',
                'Â': 'A',
                'Ä': 'A',
                'É': 'E',
                'È': 'E',
                'Ê': 'E',
                'Ẽ': 'E',
                'Ë': 'E',
                'Í': 'I',
                'Ì': 'I',
                'Î': 'I',
                'Ĩ': 'I',
                'Ï': 'I',
                'Ó': 'O',
                'Ò': 'O',
                'Ô': 'O',
                'Õ': 'O',
                'Ö': 'O',
                'Ú': 'U',
                'Ù': 'U',
                'Û': 'U',
                'Ũ': 'U',
                'Ü': 'U',
                'Ç': 'C',
                'Ý': 'Y',
                'Ỳ': 'Y',
                'Ŷ': 'Y',
                'Ỹ': 'Y',
                'Ÿ': 'Y',
                'Ñ': 'N'
            };
            for (const [acento, letra] of Object.entries(mapa)) {
                nome = nome.replace(new RegExp(acento, 'g'), letra);
            }
            // Remove caracteres não ASCII que sobrarem (exceto espaços e letras comuns)
            nome = nome.replace(/[^A-Z0-9\s\.\-]/g, '');
            // Remove espaços extras
            nome = nome.replace(/\s+/g, ' ').trim();
            return nome;
        }

        // Aplica normalização ao digitar
        const inputNome = document.getElementById('nome');
        inputNome.addEventListener('input', function() {
            const cursorPos = this.selectionStart;
            const raw = this.value;
            const normalizado = normalizarNome(raw);
            if (normalizado !== raw) {
                this.value = normalizado;
                // Ajusta cursor proporcionalmente
                const diff = normalizado.length - raw.length;
                this.setSelectionRange(cursorPos + diff, cursorPos + diff);
            }
        });

        // ===== VALIDAÇÃO DE DDD E TELEFONE (apenas dígitos) =====
        document.querySelectorAll('.ddd-input, .tel-input').forEach(inp => {
            inp.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
            });
        });

        // ===== ENVIO DO FORMULÁRIO =====
        const form = document.getElementById('formTelefones');
        const btnEnviar = document.getElementById('btnEnviar');
        const msgDiv = document.getElementById('mensagem');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            msgDiv.className = 'msg';
            msgDiv.style.display = 'none';

            // Validações básicas
            const turma = document.getElementById('turma').value;
            if (!turma) {
                mostrarMsg('Selecione a turma.', 'erro');
                return;
            }

            const nomeRaw = inputNome.value.trim();
            if (!nomeRaw) {
                mostrarMsg('Digite o nome do aluno.', 'erro');
                return;
            }
            const nome = normalizarNome(nomeRaw);

            // Coletar telefones preenchidos (ignorar linhas completamente vazias)
            const cartoes = document.querySelectorAll('.cartao-tel');
            const telefones = [];

            cartoes.forEach((cartao, idx) => {
                const parentesco = cartao.querySelector('.parentesco-select').value.trim();
                const ddd = cartao.querySelector('.ddd-input').value.trim();
                const tel = cartao.querySelector('.tel-input').value.trim();

                // Só considera se pelo menos parentesco E (ddd+tel) estiverem preenchidos
                if (parentesco && ddd && tel) {
                    if (ddd.length < 2) {
                        // Vai mostrar erro depois
                        return;
                    }
                    if (tel.length < 8 || tel.length > 9) {
                        return;
                    }
                    telefones.push({ parentesco, ddd, tel });
                }
            });

            if (telefones.length === 0) {
                mostrarMsg('Preencha ao menos um telefone completo (parentesco + DDD + número).', 'erro');
                return;
            }

            // Verificar se todos os DDDs e telefones têm tamanho correto
            for (const tel of telefones) {
                if (tel.ddd.length !== 2) {
                    mostrarMsg('DDD deve ter 2 dígitos.', 'erro');
                    return;
                }
                if (tel.tel.length < 8 || tel.tel.length > 9) {
                    mostrarMsg('Telefone deve ter 8 ou 9 dígitos.', 'erro');
                    return;
                }
            }

            // Bloquear botão
            btnEnviar.disabled = true;
            btnEnviar.innerHTML = '<span class="spinner"></span> Enviando...';

            // Montar payload
            const payload = {
                turma: turma,
                nome: nome,
                telefones: telefones
            };

            try {
                const response = await fetch(WEBAPP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // necessário para AppsScript Web App
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Com mode: 'no-cors' não conseguimos ler a resposta
                // Então assumimos sucesso se não houve erro de rede
                mostrarMsg('✅ Dados enviados com sucesso!', 'sucesso');
                form.reset();
                inputNome.focus();

            } catch (err) {
                mostrarMsg('Erro de rede: ' + err.message, 'erro');
            } finally {
                btnEnviar.disabled = false;
                btnEnviar.innerHTML = '✅ Salvar Telefones';
            }
        });

        function mostrarMsg(texto, tipo) {
            msgDiv.textContent = texto;
            msgDiv.className = 'msg ' + tipo;
            msgDiv.style.display = 'block';
        }

        // Limpar mensagem ao resetar
        document.getElementById('btnLimpar').addEventListener('click', function() {
            msgDiv.className = 'msg';
            msgDiv.style.display = 'none';
            inputNome.focus();
        });

        // Placeholder para teste local (sem o web app configurado)
        console.log('WebApp URL:', WEBAPP_URL);
    </script>

</body>
</html>
