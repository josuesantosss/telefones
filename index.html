<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Telefone de Aluno</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 20px auto; padding: 0 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        select, button { width: 100%; padding: 10px; font-size: 16px; margin-top: 5px; }
        #telefones { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; }
        .telefone-item { padding: 8px 0; font-size: 16px; border-bottom: 1px solid #ddd; }
        .telefone-item a { color: #007bff; text-decoration: none; font-weight: bold; margin-right: 10px; }
        .wa-link { color: #25d366 !important; font-size: 0.8em; }
    </style>
</head>
<body>
    <h2>Buscar Telefone do Aluno</h2>

    <label for="serie">Turma:</label>
    <select id="serie"><option value="">Carregando...</option></select>

    <label for="aluno">Aluno:</label>
    <select id="aluno" disabled><option value="">Selecione uma turma primeiro</option></select>

    <div id="telefones"><p>Selecione um aluno para ver os telefones.</p></div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvElQdkqUGxgmvpMIWxBkWzm0gMgqsM2SZcAP53TYv6-ftDQ9Up3Bj6TZX5TysYBHvmYIU4u3Z_t7b/pub?gid=1202797417&single=true&output=csv';
        const COL_TURMA = 0, COL_NOME = 1, COL_TEL1 = 5, COL_TEL2 = 9, COL_TEL3 = 13, COL_TEL4 = 16;
        let dados = [];

        async function carregarDados() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const result = Papa.parse(csvText, { header: false, skipEmptyLines: true });
                // .slice(1) remove a primeira linha (cabeçalho)
                dados = result.data.slice(1); 
                popularTurmas();
            } catch (err) {
                document.getElementById('serie').innerHTML = '<option>Erro ao carregar dados</option>';
            }
        }

        function popularTurmas() {
            const turmas = [...new Set(dados.map(row => row[COL_TURMA]).filter(v => v))];
            const select = document.getElementById('serie');
            select.innerHTML = '<option value="">Selecione a turma</option>';
            turmas.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.textContent = t;
                select.appendChild(opt);
            });
        }

        document.getElementById('serie').addEventListener('change', function() {
            const turmaSelecionada = this.value;
            const selectAluno = document.getElementById('aluno');
            
            if (!turmaSelecionada) return;

            const alunos = dados.filter(row => row[COL_TURMA] === turmaSelecionada).map(row => row[COL_NOME]);
            selectAluno.innerHTML = '<option value="">Selecione um aluno</option>';
            alunos.forEach(nome => {
                const opt = document.createElement('option');
                opt.value = nome; opt.textContent = nome;
                selectAluno.appendChild(opt);
            });
            selectAluno.disabled = false;
        });

        function formatarItem(tel, label) {
            if (!tel || tel.trim() === '' || tel === '—') return '';
            const numeroPuro = tel.replace(/\D/g, '');
            return `
                <div class="telefone-item">
                    <strong>${label}:</strong><br>
                    <a href="tel:${numeroPuro}">${tel}</a>
                    <a href="https://wa.me/55${numeroPuro}" target="_blank" class="wa-link">WhatsApp</a>
                </div>`;
        }

        document.getElementById('aluno').addEventListener('change', function() {
            const aluno = dados.find(row => row[COL_NOME] === this.value && row[COL_TURMA] === document.getElementById('serie').value);
            const divTel = document.getElementById('telefones');
            
            if (aluno) {
                divTel.innerHTML = `<h3>${this.value}</h3>` + 
                    formatarItem(aluno[COL_TEL1], "Telefone 1") +
                    formatarItem(aluno[COL_TEL2], "Telefone 2") +
                    formatarItem(aluno[COL_TEL3], "Telefone 3") +
                    formatarItem(aluno[COL_TEL4], "Telefone 4");
            }
        });

        carregarDados();
    </script>
</body>
</html>
