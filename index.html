<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMEF Cel. Aureliano Junqueira Franco</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px 35px;
            max-width: 640px;
            width: 100%;
            transition: all 0.3s ease;
            text-align: center;
        }

        /* ---- CABEÇALHO ---- */
        .header {
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 3px solid #4299e1;
        }

        .header .logo {
            font-size: 42px;
            margin-bottom: 8px;
            display: block;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a365d;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .header h1 span {
            display: block;
            font-size: 18px;
            font-weight: 400;
            color: #4a5568;
            margin-top: 4px;
            letter-spacing: 0;
        }

        .header .sub {
            font-size: 15px;
            color: #718096;
            margin-top: 6px;
            font-weight: 500;
        }

        /* ---- BOTÕES ---- */
        .botoes {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 10px 0 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 24px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            color: white;
            background: #4299e1;
            box-shadow: 0 4px 12px rgba(66, 153, 225, 0.25);
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(66, 153, 225, 0.35);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-consultar {
            background: #48bb78;
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.30);
        }
        .btn-consultar:hover {
            background: #38a169;
            box-shadow: 0 8px 24px rgba(72, 187, 120, 0.40);
        }

        .btn-editar {
            background: #ed8936;
            box-shadow: 0 4px 12px rgba(237, 137, 54, 0.30);
        }
        .btn-editar:hover {
            background: #dd6b20;
            box-shadow: 0 8px 24px rgba(237, 137, 54, 0.40);
        }

        .btn-inserir {
            background: #9f7aea;
            box-shadow: 0 4px 12px rgba(159, 122, 234, 0.30);
            cursor: not-allowed;
            opacity: 0.7;
        }
        .btn-inserir:hover {
            transform: none;
            box-shadow: 0 4px 12px rgba(159, 122, 234, 0.30);
        }

        .btn .icone {
            font-size: 24px;
            line-height: 1;
        }

        .btn .label {
            flex: 1;
            text-align: left;
        }

        .btn .badge {
            font-size: 13px;
            background: rgba(255, 255, 255, 0.20);
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 400;
        }

        /* ---- RODAPÉ ---- */
        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
            font-size: 14px;
            color: #a0aec0;
            letter-spacing: 0.3px;
        }

        .footer strong {
            color: #4a5568;
            font-weight: 600;
        }

        .footer .ano {
            color: #718096;
        }

        /* ---- RESPONSIVO ---- */
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            .header h1 {
                font-size: 21px;
            }
            .header h1 span {
                font-size: 15px;
            }
            .btn {
                font-size: 16px;
                padding: 15px 18px;
            }
            .btn .icone {
                font-size: 20px;
            }
            .btn .badge {
                font-size: 11px;
                padding: 2px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== CABEÇALHO ===== -->
        <div class="header">
            <span class="logo">🏫</span>
            <h1>
                EMEF Cel. Aureliano Junqueira Franco
                <span>Secretaria Escolar</span>
            </h1>
            <div class="sub">Sistema de Contatos</div>
        </div>

        <!-- ===== BOTÕES ===== -->
        <div class="botoes">

            <!-- Consultar Contatos -->
            <a href="consulta.html" class="btn btn-consultar">
                <span class="icone">🔍</span>
                <span class="label">Consultar Contatos</span>
                <span class="badge">visualizar</span>
            </a>

            <!-- Editar Contatos -->
            <a href="editarcontato.html" class="btn btn-editar">
                <span class="icone">✏️</span>
                <span class="label">Editar Contatos</span>
                <span class="badge">alterar</span>
            </a>

            <!-- Inserir Novo Contato (sem função) -->
            <button class="btn btn-inserir" disabled>
                <span class="icone">➕</span>
                <span class="label">Inserir Novo Aluno</span>
                <span class="badge">em breve</span>
            </button>

        </div>

        <!-- ===== RODAPÉ ===== -->
        <div class="footer">
            Desenvolvido por <strong>Josué Santos</strong> <span class="ano">2026</span>
        </div>

    </div>

</body>
</html>
